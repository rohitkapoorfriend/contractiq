services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=contractiq
      - DB_PASSWORD=contractiq_secret
      - DB_NAME=contractiq
      - DB_SSL_MODE=disable
      - JWT_SECRET=dev-secret-change-in-production
      - LOG_LEVEL=debug
      - LOG_FORMAT=json
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: contractiq
      POSTGRES_PASSWORD: contractiq_secret
      POSTGRES_DB: contractiq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contractiq"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
